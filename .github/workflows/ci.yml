name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # v2.7.3: Node 18 dropped — vitest@4 requires Node 20+
        # (uses node:util.styleText, added in Node 20.12). Node 18 went
        # EOL April 30, 2025; users on Node 18 stay pinned to v2.7.2.
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      # v2.7 Tether Phase 6 hotfix — drift-out guards
      # (tests/v2-6-tether-transport-diagnostics.test.ts +
      # tests/v2-7-tether-reconnection-options.test.ts) assert against the
      # compiled VSIX-shipped artifact at extensions/vscode/out/extension.js.
      # The local pre-publish gate (scripts/pre-publish-check.sh) builds the
      # extension, but CI's `test` job runs `npx vitest run` directly — without
      # this, those guards fail with "missing extensions/vscode/out/extension.js".
      # Position is load-bearing: BEFORE the test steps, AFTER root install.
      #
      # v2.15.2 — build the esbuild BUNDLE (`npm run bundle`), not the tsc
      # per-module compile. The ext unit suite's VSIX/bundle guards
      # (v0-1-4-vsix-contents V10 + v0-1-4-bundle) inspect the REAL shipped
      # artifact: a single bundled out/extension.js (+ extension.meta.json).
      # `npm run compile` (tsc) emits ~32 per-module files with no metafile, so
      # the VSIX would package 36 files (V10 caps at 10) and the bundle test's
      # metafile read would throw. `npm run typecheck` preserves ext type safety
      # that the tsc emit used to provide. The drift-out root guards read this
      # same bundled out/extension.js (their byte-offset scan handles the
      # minified bundle).
      - name: Build VSCode extension bundle (drift-out + ext-unit VSIX/bundle guards need the shipped out/extension.js)
        run: |
          cd extensions/vscode
          npm install
          npm run typecheck
          npm run bundle

      # v2.15.2 — run the VSCode extension unit suite in CI. Previously it ran
      # ONLY locally (root `npm test` covers tests/, whose vitest config excludes
      # extensions/vscode/src/*.test.ts), so ext-side regressions (e.g. the
      # v0.4.1 health-poll status-check) were gated by hand. The ext deps + the
      # bundle are produced by the step above. Note: the VSIX-content guards
      # (v0-1-4-vsix-contents) shell out to `vsce package`; if they flake on CI,
      # add a retry/timeout there rather than dropping this gate.
      - name: Run VSCode extension unit tests
        run: |
          cd extensions/vscode
          npm run test:unit

      - name: Run test suite
        run: npx vitest run

      - name: npm audit (high+) — via resilience wrapper
        # v2.3.0 patch round (2026-04-23): threshold bumped moderate → high
        # after GHSA-w5hq-g745-h8pq (uuid <14 buffer bounds, v3/v5/v6+buf).
        # We use v4() no-args only — not vulnerable. v2.7.3 dropped Node 18
        # so uuid@14 + vitest@4 can both upgrade cleanly.
        #
        # v2.4.3 R1 HIGH 1 (Codex 2026-04-27): all `npm audit` invocations
        # (CI + pre-publish gate alike) MUST go through scripts/audit-with-
        # retry.sh. Calling raw `npm audit` here was the original v2.4.0
        # CI-red-on-flake bug Codex caught — fixed in pre-publish but the
        # CI step itself stayed raw, leaving the public main badge exposed
        # to the same registry endpoint flakes the wrapper exists to absorb.
        # Guarded by tests/v2-4-3-ci-audit-bypass-guard.test.ts.
        run: bash scripts/audit-with-retry.sh high

  # macOS launchd side-effect guard. The Ubuntu `test` job structurally CANNOT
  # catch a test that shells to real `launchctl` — init.ts's daemon bootstrap is
  # darwin-gated, so a `runInit` test that forgets RELAY_SKIP_DAEMON silently
  # installs a real launchd KeepAlive service + a :3777 daemon on a contributor's
  # Mac under `npm test` (the exact bug this job exists to prevent recurring).
  # This runs the suite on macOS and then ASSERTS no bot-relay launchd service
  # leaked, so a future unguarded runInit caller fails HERE instead of on a Mac.
  test-macos:
    name: Test (macOS — launchd side-effect guard)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Same as the Ubuntu job: the drift-out + ext-unit guards read the shipped
      # extensions/vscode/out/extension.js, so build it before the suite runs.
      - name: Build VSCode extension bundle
        run: |
          cd extensions/vscode
          npm install
          npm run typecheck
          npm run bundle

      - name: Assert no bot-relay launchd service pre-exists on the runner
        run: |
          if launchctl list 2>/dev/null | grep -q 'com.lumiereventures.bot-relay'; then
            echo "Unexpected: a bot-relay launchd service already exists on the runner"; exit 1
          fi

      - name: Run test suite
        run: npx vitest run

      - name: Assert the suite installed NO real launchd service
        run: |
          if launchctl list 2>/dev/null | grep -q 'com.lumiereventures.bot-relay'; then
            echo "FAIL: a test shelled to real launchctl and installed a bot-relay daemon service:"
            launchctl list | grep bot-relay
            echo "Fix: set RELAY_SKIP_DAEMON=1 in the offending runInit test (see tests/v2-4-0-instance-cli.test.ts)."
            exit 1
          fi
          echo "OK: no bot-relay launchd service leaked"

  smoke:
    name: 25-tool smoke (Node 22)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run 25-tool smoke against isolated relay
        run: bash scripts/pre-publish-check.sh
