name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Run test suite
        run: npx vitest run

      - name: npm audit (high+)
        # v2.3.0 patch round (2026-04-23): threshold bumped moderate → high
        # after GHSA-w5hq-g745-h8pq (uuid <14 buffer bounds, v3/v5/v6+buf).
        # We use v4() no-args only — not vulnerable. uuid@14 drops Node 18
        # support; engines field still commits to >=18. Kept in sync with
        # scripts/pre-publish-check.sh's --audit-level=high.
        run: npm audit --audit-level=high

  smoke:
    name: 25-tool smoke (Node 22)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run 25-tool smoke against isolated relay
        run: bash scripts/pre-publish-check.sh
